<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="#6C63FF"/>

  <!-- Calculator body -->
  <rect x="156" y="106" width="200" height="300" rx="24" fill="white"/>

  <!-- Screen area -->
  <rect x="174" y="124" width="164" height="108" rx="14" fill="#5750E8"/>

  <!-- Upward trending line on screen -->
  <polyline
    points="190,218 220,196 250,207 280,178 304,158 318,144"
    stroke="white"
    stroke-width="11"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Minimal button hints: 3x3 grid of small rounded squares -->
  <rect x="175" y="264" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="239" y="264" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="303" y="264" width="34" height="22" rx="7" fill="#B0A8FF"/>

  <rect x="175" y="300" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="239" y="300" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="303" y="300" width="34" height="22" rx="7" fill="#B0A8FF"/>

  <rect x="175" y="336" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="239" y="336" width="34" height="22" rx="7" fill="#B0A8FF"/>
  <rect x="303" y="336" width="34" height="22" rx="7" fill="#B0A8FF"/>
</svg>
